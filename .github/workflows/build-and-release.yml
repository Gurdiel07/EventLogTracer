name: Build & Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore EventLogTracer.sln

      - name: Build
        run: dotnet build EventLogTracer.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test EventLogTracer.sln --configuration Release --no-build --verbosity normal

      - name: Publish self-contained single-file (win-x64)
        run: >
          dotnet publish EventLogTracer.App/EventLogTracer.App.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:PublishTrimmed=false
          -p:IncludeAllContentForSelfExtract=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o ./publish

      - name: Zip release artifact
        run: Compress-Archive -Path ./publish/* -DestinationPath EventLogTracer-win-x64.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: EventLogTracer-win-x64
          path: EventLogTracer-win-x64.zip
          retention-days: 14

  release:
    needs: build
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: EventLogTracer-win-x64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: EventLogTracer-win-x64.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
